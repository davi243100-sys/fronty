<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>fronty</title>

<style>
body { margin:0; overflow:hidden; background:#121212; }

.mobile-controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
}

.btn {
    width: 50px;
    height: 50px;
    background: #2ecc71;
    margin: 5px;
    display: inline-block;
    border-radius: 10px;
    text-align: center;
    line-height: 50px;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="mobileUI" class="mobile-controls" style="display:none;">
    <div>
        <div class="btn" ontouchstart="keys['w']=true" ontouchend="keys['w']=false">↑</div>
    </div>
    <div>
        <div class="btn" ontouchstart="keys['a']=true" ontouchend="keys['a']=false">←</div>
        <div class="btn" ontouchstart="keys['s']=true" ontouchend="keys['s']=false">↓</div>
        <div class="btn" ontouchstart="keys['d']=true" ontouchend="keys['d']=false">→</div>
    </div>
    <div>
        <div class="btn" ontouchstart="jump()">⤴</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// DETECTAR MOBILE
const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
if(isMobile){
    document.getElementById("mobileUI").style.display = "block";
}

// CENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// PERSONAGEM ESTILO ROBLOX
const player = new THREE.Group();

// CORPO
const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.5,2,0.8),
    new THREE.MeshBasicMaterial({color: 0x00aaff})
);
body.position.y = 1;
player.add(body);

// CABEÇA
const head = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({color: 0xffcc99})
);
head.position.y = 2.5;
player.add(head);

// BRAÇOS
const leftArm = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,1.8,0.5),
    new THREE.MeshBasicMaterial({color: 0x00aaff})
);
leftArm.position.set(-1.2,1.2,0);
player.add(leftArm);

const rightArm = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,1.8,0.5),
    new THREE.MeshBasicMaterial({color: 0x00aaff})
);
rightArm.position.set(1.2,1.2,0);
player.add(rightArm);

// PERNAS
const leftLeg = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,2,0.6),
    new THREE.MeshBasicMaterial({color: 0x3333ff})
);
leftLeg.position.set(-0.4,-1,0);
player.add(leftLeg);

const rightLeg = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,2,0.6),
    new THREE.MeshBasicMaterial({color: 0x3333ff})
);
rightLeg.position.set(0.4,-1,0);
player.add(rightLeg);

// POSIÇÃO
player.position.set(0,5,0);
scene.add(player);

// FÍSICA
let velocityY = 0;
let onGround = false;

// CONTROLES
let keys = {};

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function jump(){
    if(onGround){
        velocityY = 0.25;
        onGround = false;
    }
}

// PLATAFORMAS
const platforms = [];

function createPlatform(x,y,z,w,h,d){
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w,h,d),
        new THREE.MeshBasicMaterial({color: 0x228B22})
    );
    mesh.position.set(x,y,z);
    scene.add(mesh);
    platforms.push(mesh);
}

// PARKOUR
createPlatform(0,0,0,10,1,10);
createPlatform(5,2,5,3,1,3);
createPlatform(10,4,8,3,1,3);
createPlatform(15,6,12,3,1,3);
createPlatform(20,8,15,3,1,3);
createPlatform(25,10,20,5,1,5);

// COLISÃO
function checkCollision(){
    onGround = false;

    platforms.forEach(p => {
        const dx = Math.abs(player.position.x - p.position.x);
        const dz = Math.abs(player.position.z - p.position.z);
        const dy = player.position.y - (p.position.y + 0.5);

        if(dx < 2 && dz < 2 && dy < 1 && dy > 0){
            player.position.y = p.position.y + 1.5;
            velocityY = 0;
            onGround = true;
        }
    });
}

// LOOP
function animate(){
    requestAnimationFrame(animate);

    // MOVIMENTO
    if(keys["w"]) player.position.z -= 0.1;
    if(keys["s"]) player.position.z += 0.1;
    if(keys["a"]) player.position.x -= 0.1;
    if(keys["d"]) player.position.x += 0.1;

    if(keys[" "]) jump();

    // GRAVIDADE
    velocityY -= 0.01;
    player.position.y += velocityY;

    checkCollision();

    // CAMERA
    camera.position.set(
        player.position.x + 5,
        player.position.y + 5,
        player.position.z + 5
    );
    camera.lookAt(player.position);

    renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
