<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>fronty</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#121212; color:white; }

#menu {
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:20px;
    z-index:10;
}

.card {
    width:180px;
    height:140px;
    background:#1f1f1f;
    border-radius:10px;
    padding:10px;
}

.play-btn {
    margin-top:10px;
    background:#2ecc71;
    padding:10px;
    text-align:center;
    cursor:pointer;
    border-radius:5px;
}

#hpBar {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 200px;
    height: 20px;
    background: #333;
    display:none;
}
#hp { height:100%; width:100%; background:red; }

#crosshair {
    position:fixed;
    top:50%;
    left:50%;
    width:10px;
    height:10px;
    background:white;
    transform:translate(-50%,-50%);
    display:none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <div class="card">
        <h3>Parkour</h3>
        <div class="play-btn" onclick="startGame('parkour')">Entrar</div>
    </div>

    <div class="card">
        <h3>Mata-mata rápido</h3>
        <div class="play-btn" onclick="startGame('battle')">Entrar</div>
    </div>
</div>

<div id="hpBar"><div id="hp"></div></div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, gameMode;

let hp = 100;
const hpBar = document.getElementById("hp");

function startGame(mode){
    gameMode = mode;

    document.getElementById("menu").style.display = "none";
    document.getElementById("hpBar").style.display = "block";
    document.getElementById("crosshair").style.display = (mode === "battle") ? "block" : "none";

    init();
}

// ===== INIT =====
function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// PLAYER
player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshBasicMaterial({color:0x00aaff})
);
player.position.y = 2;
scene.add(player);

// CHÃO
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500,500),
    new THREE.MeshBasicMaterial({color:0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== PARKOUR =====
if(gameMode === "parkour"){

    function plat(x,y,z,c){
        const p = new THREE.Mesh(
            new THREE.BoxGeometry(3,1,3),
            new THREE.MeshBasicMaterial({color:c})
        );
        p.position.set(x,y,z);
        scene.add(p);
    }

    plat(5,2,5,0xff0000);
    plat(10,3,8,0x0000ff);
    plat(15,4,12,0xffff00);
    plat(20,5,16,0xff00ff);
    plat(25,6,20,0x00ffff);
}

// ===== BATTLE MODE =====
if(gameMode === "battle"){

    // cidade simples
    for(let i=0;i<20;i++){
        const b = new THREE.Mesh(
            new THREE.BoxGeometry(2,Math.random()*6+2,2),
            new THREE.MeshBasicMaterial({color:0x888888})
        );
        b.position.set((Math.random()-0.5)*50, b.geometry.parameters.height/2, (Math.random()-0.5)*50);
        scene.add(b);
    }

    // inimigo
    enemy = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshBasicMaterial({color:0xff0000})
    );
    enemy.position.set(5,1,-5);
    scene.add(enemy);
}

// CONTROLES
let keys = {};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// CÂMERA
let rot = 0;

document.body.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",(e)=>{
 if(document.pointerLockElement === document.body){
    rot -= e.movementX * 0.0025;
 }
});

// TIRO
window.addEventListener("click",()=>{
    if(gameMode === "battle"){
        shoot();
    }
});

function shoot(){
    if(!enemy) return;

    const dist = player.position.distanceTo(enemy.position);
    if(dist < 10){
        scene.remove(enemy);
        enemy = null;
        alert("Você ganhou!");
    }
}

// MOVIMENTO
let velY = 0;
let onGround = false;

function jump(){
 if(onGround){
    velY = 0.25;
    onGround = false;
 }
}

// LOOP
function animate(){
 requestAnimationFrame(animate);

 let speed = 0.12;

 let mx = 0;
 let mz = 0;

 if(keys["w"]) mz -= 1;
 if(keys["s"]) mz += 1;
 if(keys["a"]) mx -= 1;
 if(keys["d"]) mx += 1;

 player.position.x += (Math.sin(rot)*mz + Math.sin(rot+Math.PI/2)*mx) * speed;
 player.position.z += (Math.cos(rot)*mz + Math.cos(rot+Math.PI/2)*mx) * speed;

 if(keys[" "] && gameMode==="parkour") jump();

 velY -= 0.01;
 player.position.y += velY;

 if(player.position.y < 1){
    player.position.y = 1;
    velY = 0;
    onGround = true;
 }

 // câmera
 camera.position.set(
    player.position.x + Math.sin(rot)*6,
    player.position.y + 4,
    player.position.z + Math.cos(rot)*6
 );

 camera.lookAt(player.position);

 renderer.render(scene,camera);
}

animate();

}

</script>

</body>
</html>
