<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>fronty</title>

<style>
body { margin:0; overflow:hidden; background:#121212; }

/* VIDA */
#hpBar {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 200px;
    height: 20px;
    background: #333;
}
#hp {
    height: 100%;
    width: 100%;
    background: red;
}

/* MOBILE */
.mobile-controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
}

.btn {
    width: 50px;
    height: 50px;
    background: #2ecc71;
    margin: 5px;
    display: inline-block;
    border-radius: 10px;
    text-align: center;
    line-height: 50px;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="hpBar"><div id="hp"></div></div>

<div id="mobileUI" class="mobile-controls" style="display:none;">
    <div>
        <div class="btn" ontouchstart="keys['w']=true" ontouchend="keys['w']=false">↑</div>
    </div>
    <div>
        <div class="btn" ontouchstart="keys['a']=true" ontouchend="keys['a']=false">←</div>
        <div class="btn" ontouchstart="keys['s']=true" ontouchend="keys['s']=false">↓</div>
        <div class="btn" ontouchstart="keys['d']=true" ontouchend="keys['d']=false">→</div>
    </div>
    <div>
        <div class="btn" ontouchstart="jump()">⤴</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// MOBILE
const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
if(isMobile){
    document.getElementById("mobileUI").style.display = "block";
}

// VIDA
let hp = 100;
const hpBar = document.getElementById("hp");

function damage(d){
    hp -= d;
    if(hp < 0) hp = 0;
    hpBar.style.width = hp + "%";

    if(hp <= 0){
        respawn(true);
    }
}

// CENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== PLAYER =====
const player = new THREE.Group();
player.scale.set(0.6,0.6,0.6);

// CORPO
const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.5,2,0.8),
    new THREE.MeshBasicMaterial({color: 0x00aaff})
);
body.position.y = 1;
player.add(body);

// CABEÇA
const head = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({color: 0xffcc99})
);
head.position.y = 2.5;
player.add(head);

// ROSTO (IMPORTANTE)
const face = new THREE.Mesh(
    new THREE.PlaneGeometry(0.6,0.6),
    new THREE.MeshBasicMaterial({color: 0x000000})
);
face.position.set(0,2.5,0.51);
player.add(face);

// BRAÇOS
function arm(x){
    const m = new THREE.Mesh(
        new THREE.BoxGeometry(0.5,1.8,0.5),
        new THREE.MeshBasicMaterial({color: 0x00aaff})
    );
    m.position.set(x,1.2,0);
    return m;
}
player.add(arm(-1.2));
player.add(arm(1.2));

// PERNAS
function leg(x){
    const m = new THREE.Mesh(
        new THREE.BoxGeometry(0.6,2,0.6),
        new THREE.MeshBasicMaterial({color: 0x3333ff})
    );
    m.position.set(x,-1,0);
    return m;
}
player.add(leg(-0.4));
player.add(leg(0.4));

player.position.set(0,3,0);
scene.add(player);

// CHÃO
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500,500),
    new THREE.MeshBasicMaterial({color: 0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLATAFORMAS
const platforms = [];
function createPlatform(x,y,z,color){
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(3,1,3),
        new THREE.MeshBasicMaterial({color})
    );
    mesh.position.set(x,y,z);
    scene.add(mesh);
    platforms.push(mesh);
}

createPlatform(5,2,5,0xff0000);
createPlatform(10,4,8,0x0000ff);
createPlatform(15,6,12,0xffff00);
createPlatform(20,8,16,0xff00ff);
createPlatform(25,10,20,0x00ffff);

// CONTROLE
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// FÍSICA
let velocityY = 0;
let onGround = false;

function jump(){
    if(onGround){
        velocityY = 0.25;
        onGround = false;
    }
}

// COLISÃO
function checkCollision(){
    onGround = false;

    platforms.forEach(p=>{
        const dx = Math.abs(player.position.x - p.position.x);
        const dz = Math.abs(player.position.z - p.position.z);
        const dy = player.position.y - (p.position.y + 0.5);

        if(dx < 2 && dz < 2 && dy < 1 && dy > 0){
            player.position.y = p.position.y + 1.5;
            velocityY = 0;
            onGround = true;
        }
    });

    if(player.position.y <= 1.5){
        player.position.y = 1.5;
        velocityY = 0;
        onGround = true;
    }
}

// RESPAWN
function respawn(resetHP=false){
    player.position.set(0,3,0);
    velocityY = 0;
    if(resetHP){
        hp = 100;
        hpBar.style.width = "100%";
    }
}

// LOOP
function animate(){
    requestAnimationFrame(animate);

    let speed = 0.12;

    let moveX = 0;
    let moveZ = 0;

    if(keys["w"]) moveZ -= speed;
    if(keys["s"]) moveZ += speed;
    if(keys["a"]) moveX -= speed;
    if(keys["d"]) moveX += speed;

    player.position.x += moveX;
    player.position.z += moveZ;

    // ROTAÇÃO REAL
    if(moveX !== 0 || moveZ !== 0){
        let angle = Math.atan2(moveX, moveZ);
        player.rotation.y = angle;
    }

    if(keys[" "]) jump();

    velocityY -= 0.01;
    player.position.y += velocityY;

    checkCollision();

    // CAIU NO VAZIO
    if(player.position.y < -10){
        damage(25);
        respawn();
    }

    // CAMERA
    camera.position.set(
        player.position.x + 6,
        player.position.y + 6,
        player.position.z + 6
    );
    camera.lookAt(player.position);

    renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
