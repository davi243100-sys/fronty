<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>fronty</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#121212; color:white; }

#menu {
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:20px;
    z-index:10;
}

.card {
    width:180px;
    height:140px;
    background:#1f1f1f;
    border-radius:10px;
    padding:10px;
}

.play-btn {
    margin-top:10px;
    background:#2ecc71;
    padding:10px;
    text-align:center;
    cursor:pointer;
    border-radius:5px;
}

#hpBar {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 200px;
    height: 20px;
    background: #333;
    display:none;
}
#hp { height:100%; width:100%; background:red; }

#crosshair {
    position:fixed;
    top:50%;
    left:50%;
    width:6px;
    height:6px;
    background:white;
    transform:translate(-50%,-50%);
    display:none;
}

#hotbar {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}

.slot {
    width:50px;
    height:50px;
    background:#333;
    border:2px solid #555;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.slot.active {
    border-color:yellow;
    background:#555;
}
</style>
</head>

<body>

<div id="menu">
    <div class="card">
        <h3>Parkour</h3>
        <div class="play-btn" onclick="start('parkour')">Entrar</div>
    </div>

    <div class="card">
        <h3>Mata-mata rápido</h3>
        <div class="play-btn" onclick="start('battle')">Entrar</div>
    </div>
</div>

<div id="hpBar"><div id="hp"></div></div>
<div id="crosshair"></div>
<div id="hotbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene, camera, renderer;
let player, enemy;
let mode;

let rot = 0;

let hp = 100;

let bullets = [];

// INVENTÁRIO (TOOL)
let inventory = [
    {name:"Mão", type:"hand"},
    {name:"Pistol", type:"tool"}
];

let selectedItem = 0;

const hotbar = document.getElementById("hotbar");

function renderInventory(){
    hotbar.innerHTML = "";

    inventory.forEach((item,i)=>{
        let d = document.createElement("div");
        d.className = "slot" + (i===selectedItem ? " active":"");
        d.innerText = item.name;

        d.onclick = ()=>{
            selectedItem = i;
            renderInventory();
        };

        hotbar.appendChild(d);
    });
}

renderInventory();

function start(m){
    mode = m;
    document.getElementById("menu").style.display = "none";
    document.getElementById("hpBar").style.display = "block";
    if(m==="battle") document.getElementById("crosshair").style.display="block";
    init();
}

// ===== INIT =====
function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// PLAYER
player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshBasicMaterial({color:0x00aaff})
);
player.position.y = 2;
scene.add(player);

// CHÃO
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500,500),
    new THREE.MeshBasicMaterial({color:0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PARKOUR
let platforms = [];

function plat(x,y,z,c){
    let p = new THREE.Mesh(
        new THREE.BoxGeometry(3,1,3),
        new THREE.MeshBasicMaterial({color:c})
    );
    p.position.set(x,y,z);
    scene.add(p);
    platforms.push(p);
}

if(mode==="parkour"){
    plat(5,2,5,0xff0000);
    plat(10,3,8,0x0000ff);
    plat(15,4,12,0xffff00);
    plat(20,5,16,0xff00ff);
    plat(25,6,20,0x00ffff);
}

// BATTLE
if(mode==="battle"){
    enemy = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshBasicMaterial({color:0xff0000})
    );
    enemy.position.set(5,1,-5);
    scene.add(enemy);
}

// CONTROLES
let keys = {};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// POINTER LOCK
document.body.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",(e)=>{
 if(document.pointerLockElement === document.body){
    rot -= e.movementX * 0.0025;
 }
});

// ===== TIRO (TOOL) =====
window.addEventListener("click",()=>{
    shoot();
});

function shoot(){

    if(mode!=="battle") return;

    let item = inventory[selectedItem];

    if(item.type!=="tool") return;

    let bullet = new THREE.Mesh(
        new THREE.SphereGeometry(0.1,8,8),
        new THREE.MeshBasicMaterial({color:0xffff00})
    );

    bullet.position.copy(player.position);
    bullet.position.y += 1;

    let dir = new THREE.Vector3(
        Math.sin(rot),
        0,
        Math.cos(rot)
    );

    bullet.userData.vel = dir.multiplyScalar(0.5);

    scene.add(bullet);
    bullets.push(bullet);
}

// FÍSICA
let vy = 0;

function jump(){
    vy = 0.25;
}

// LOOP
function animate(){
 requestAnimationFrame(animate);

 let speed = 0.12;

 let mx=0,mz=0;

 if(keys["w"]) mz-=1;
 if(keys["s"]) mz+=1;
 if(keys["a"]) mx-=1;
 if(keys["d"]) mx+=1;

 player.position.x += (Math.sin(rot)*mz + Math.sin(rot+Math.PI/2)*mx)*speed;
 player.position.z += (Math.cos(rot)*mz + Math.cos(rot+Math.PI/2)*mx)*speed;

 if(keys[" "]) jump();

 vy -= 0.01;
 player.position.y += vy;

 if(player.position.y < 1){
    player.position.y = 1;
    vy = 0;
 }

 // BALAS
 for(let i=0;i<bullets.length;i++){
    let b = bullets[i];

    b.position.add(b.userData.vel);

    if(enemy){
        if(b.position.distanceTo(enemy.position) < 1){
            scene.remove(enemy);
            enemy = null;
            alert("Eliminado!");
        }
    }

    if(b.position.distanceTo(player.position) > 50){
        scene.remove(b);
        bullets.splice(i,1);
        i--;
    }
 }

 camera.position.set(
    player.position.x + Math.sin(rot)*6,
    player.position.y + 4,
    player.position.z + Math.cos(rot)*6
 );

 camera.lookAt(player.position);

 renderer.render(scene,camera);
}

animate();

}

</script>

</body>
</html>
