<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>fronty</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#121212; color:white; }

/* MENU */
#menu {
    padding:20px;
}

.game-card {
    width:200px;
    height:150px;
    background:#1f1f1f;
    border-radius:10px;
    padding:10px;
}

.play-btn {
    margin-top:10px;
    background:#2ecc71;
    padding:10px;
    text-align:center;
    cursor:pointer;
    border-radius:5px;
}

/* VIDA */
#hpBar {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 200px;
    height: 20px;
    background: #333;
}
#hp {
    height: 100%;
    width: 100%;
    background: red;
}

/* BOTÃO MÚSICA */
#musicBtn {
    position:fixed;
    top:20px;
    right:20px;
    z-index:999;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <div class="game-card">
        <h3>Teste</h3>
        <div class="play-btn" onclick="startGame()">Entrar</div>
    </div>
</div>

<!-- VIDA -->
<div id="hpBar" style="display:none;"><div id="hp"></div></div>

<!-- BOTÃO MÚSICA -->
<button id="musicBtn">🎵 Música ON</button>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_5c6c0c0a59.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

function startGame(){
    document.getElementById("menu").style.display = "none";
    document.getElementById("hpBar").style.display = "block";
    initGame();
}

// ===== MÚSICA =====
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

let playing = false;

btn.onclick = () => {
    if(!playing){
        music.play();
        btn.innerText = "🔇 Música OFF";
    } else {
        music.pause();
        btn.innerText = "🎵 Música ON";
    }
    playing = !playing;
};

// ===== VIDA =====
let hp = 100;
const hpBar = document.getElementById("hp");

function damage(d){
    hp -= d;
    if(hp < 0) hp = 0;
    hpBar.style.width = hp + "%";

    if(hp <= 0){
        respawn(true);
    }
}

// ===== JOGO =====
function initGame(){

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== PLAYER =====
const player = new THREE.Group();
player.scale.set(0.6,0.6,0.6);

// corpo
const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.5,2,0.8),
    new THREE.MeshBasicMaterial({color: 0x00aaff})
);
body.position.y = 1;
player.add(body);

// cabeça
const head = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({color: 0xffcc99})
);
head.position.y = 2.5;
player.add(head);

// rosto
const face = new THREE.Mesh(
    new THREE.PlaneGeometry(0.6,0.6),
    new THREE.MeshBasicMaterial({color: 0x000000})
);
face.position.set(0,2.5,0.51);
player.add(face);

// braços
function arm(x){
    const m = new THREE.Mesh(
        new THREE.BoxGeometry(0.5,1.8,0.5),
        new THREE.MeshBasicMaterial({color: 0x00aaff})
    );
    m.position.set(x,1.2,0);
    return m;
}
player.add(arm(-1.2));
player.add(arm(1.2));

// pernas
const leftLeg = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,2,0.6),
    new THREE.MeshBasicMaterial({color: 0x3333ff})
);
leftLeg.position.set(-0.4,-1,0);
player.add(leftLeg);

const rightLeg = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,2,0.6),
    new THREE.MeshBasicMaterial({color: 0x3333ff})
);
rightLeg.position.set(0.4,-1,0);
player.add(rightLeg);

player.position.set(0,3,0);
scene.add(player);

// chão
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500,500),
    new THREE.MeshBasicMaterial({color: 0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// plataformas
const platforms = [];
function createPlatform(x,y,z,color){
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(3,1,3),
        new THREE.MeshBasicMaterial({color})
    );
    mesh.position.set(x,y,z);
    scene.add(mesh);
    platforms.push(mesh);
}

createPlatform(5,2,5,0xff0000);
createPlatform(10,4,8,0x0000ff);
createPlatform(15,6,12,0xffff00);
createPlatform(20,8,16,0xff00ff);
createPlatform(25,10,20,0x00ffff);

// controles
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// câmera (mouse direito)
let rotating = false;
let rotationY = 0;

window.addEventListener("mousedown", (e)=>{
    if(e.button === 2) rotating = true;
});
window.addEventListener("mouseup", ()=> rotating = false);
window.addEventListener("contextmenu", e => e.preventDefault());

window.addEventListener("mousemove", (e)=>{
    if(rotating){
        rotationY -= e.movementX * 0.003;
    }
});

// mobile
let lastTouchX = 0;
window.addEventListener("touchstart", (e)=>{
    lastTouchX = e.touches[0].clientX;
});
window.addEventListener("touchmove", (e)=>{
    let x = e.touches[0].clientX;
    let dx = x - lastTouchX;
    rotationY -= dx * 0.005;
    lastTouchX = x;
});

// física
let velocityY = 0;
let onGround = false;

function jump(){
    if(onGround){
        velocityY = 0.25;
        onGround = false;
    }
}

// colisão
function checkCollision(){
    onGround = false;

    platforms.forEach(p=>{
        const dx = Math.abs(player.position.x - p.position.x);
        const dz = Math.abs(player.position.z - p.position.z);
        const dy = player.position.y - (p.position.y + 0.5);

        if(dx < 2 && dz < 2 && dy < 1 && dy > 0){
            player.position.y = p.position.y + 1.5;
            velocityY = 0;
            onGround = true;
        }
    });

    if(player.position.y <= 1.5){
        player.position.y = 1.5;
        velocityY = 0;
        onGround = true;
    }
}

// respawn
function respawn(reset=false){
    player.position.set(0,3,0);
    velocityY = 0;
    if(reset){
        hp = 100;
        hpBar.style.width = "100%";
    }
}

// loop
function animate(){
    requestAnimationFrame(animate);

    let speed = 0.12;

    let moveX = 0;
    let moveZ = 0;

    if(keys["w"]) moveZ -= speed;
    if(keys["s"]) moveZ += speed;
    if(keys["a"]) moveX -= speed;
    if(keys["d"]) moveX += speed;

    player.position.x += moveX;
    player.position.z += moveZ;

    // rotação
    if(moveX !== 0 || moveZ !== 0){
        let angle = Math.atan2(moveX, moveZ);
        player.rotation.y = angle;
    }

    // animação
    let walk = Math.sin(Date.now()*0.01)*0.5;
    if(moveX !== 0 || moveZ !== 0){
        leftLeg.rotation.x = walk;
        rightLeg.rotation.x = -walk;
    }

    if(keys[" "]) jump();

    velocityY -= 0.01;
    player.position.y += velocityY;

    checkCollision();

    if(player.position.y < -10){
        damage(25);
        respawn();
    }

    // câmera
    camera.position.set(
        player.position.x + Math.sin(rotationY)*6,
        player.position.y + 4,
        player.position.z + Math.cos(rotationY)*6
    );
    camera.lookAt(player.position);

    renderer.render(scene, camera);
}

animate();

}

</script>

</body>
</html>
